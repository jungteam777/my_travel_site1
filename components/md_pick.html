<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body { margin: 0; font-family: 'Pretendard', sans-serif; background-color: #fff; padding: 40px 0; -webkit-font-smoothing: antialiased; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 16px; }
        
        .md-header { text-align: center; margin-bottom: 30px; }
        .md-header .sub { color: #ff4d4d; font-weight: 700; font-size: 13px; letter-spacing: 1px; margin-bottom: 6px; display: block; }
        .md-header h2 { font-size: 26px; margin: 0; color: #111; font-weight: 800; line-height: 1.2; }
        .md-header .line { width: 24px; height: 2px; background: #ff4d4d; margin: 15px auto; }

        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px; 
        }

        .card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #f0f0f0;
            transition: transform 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
        }
        .card:hover { transform: translateY(-5px); }

        .img-wrap { width: 100%; aspect-ratio: 1 / 1; overflow: hidden; position: relative; background: #f5f5f5; }
        .img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .card:hover .img-wrap img { transform: scale(1.05); }
        
        .md-pick { 
            position: absolute; top: 10px; left: 10px; 
            background: rgba(17, 17, 17, 0.85); color: #fff; 
            padding: 4px 8px; font-size: 10px; font-weight: 600; 
            border-radius: 4px; backdrop-filter: blur(4px);
            z-index: 2;
        }

        .info-wrap { padding: 15px; display: flex; flex-direction: column; flex-grow: 1; }
        .info-wrap .title { 
            font-size: 16px; font-weight: 700; color: #222; 
            margin-bottom: 8px; line-height: 1.4; 
            height: 44px; overflow: hidden; 
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; 
        }
        .info-wrap .desc { 
            font-size: 12px; color: #999; margin-bottom: 12px; 
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; 
        }
        
        .price-wrap { margin-top: auto; padding-top: 10px; border-top: 1px solid #f8f8f8; text-align: left; }
        .price-wrap .price { font-size: 18px; font-weight: 800; color: #111; }
        .price-wrap .unit { font-size: 12px; color: #666; font-weight: 400; margin-left: 1px; }

        @media (max-width: 768px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .info-wrap .desc { display: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="md-header">
        <span class="sub">MD'S CHOICE</span>
        <h2>전문가 추천 상품</h2>
        <div class="line"></div>
    </div>
    
    <div class="product-grid">
        <a href="#" class="card">
            <div class="img-wrap">
                <div class="md-pick">MD추천</div>
                <img src="../images/md1.jpg" alt="추천상품1">
            </div>
            <div class="info-wrap">
                <div class="title">아이슬란드 오로라 헌팅 투어 7일</div>
                <div class="desc">북유럽 | 환상적인 대자연</div>
                <div class="price-wrap"><span class="price">3,900,000</span><span class="unit">원~</span></div>
            </div>
        </a>

        <a href="#" class="card">
            <div class="img-wrap">
                <div class="md-pick">MD추천</div>
                <img src="../images/md2.jpg" alt="추천상품2">
            </div>
            <div class="info-wrap">
                <div class="title">이탈리아 남부 토스카나 와이너리 투어</div>
                <div class="desc">서유럽 | 낭만 가득한 여정</div>
                <div class="price-wrap"><span class="price">4,200,000</span><span class="unit">원~</span></div>
            </div>
        </a>

        <a href="#" class="card">
            <div class="img-wrap">
                <div class="md-pick">MD추천</div>
                <img src="../images/md3.jpg" alt="추천상품3">
            </div>
            <div class="info-wrap">
                <div class="title">뉴질랜드 남섬 밀포드 사운드 9일</div>
                <div class="desc">오세아니아 | 순수의 세계</div>
                <div class="price-wrap"><span class="price">5,100,000</span><span class="unit">원~</span></div>
            </div>
        </a>

        <a href="#" class="card">
            <div class="img-wrap">
                <div class="md-pick">MD추천</div>
                <img src="../images/md4.jpg" alt="추천상품4">
            </div>
            <div class="info-wrap">
                <div class="title">모로코 사하라 사막 별빛 캠핑 10일</div>
                <div class="desc">아프리카 | 이색적인 모험</div>
                <div class="price-wrap"><span class="price">2,800,000</span><span class="unit">원~</span></div>
            </div>
        </a>
    </div>
</div>

</body>
</html>
