<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        /* [핵심] 여기서 overflow: hidden;을 반드시 제거하거나 visible로 바꿔야 합니다 */
        body, html { 
            margin: 0; 
            padding: 0; 
            font-family: 'Pretendard', sans-serif; 
            width: 100%; 
            height: auto !important; 
            overflow: visible !important; /* 스크롤을 강제로 살려냅니다 */
        }

        /* 배너 박스 설정 */
        .banner-wrapper { 
            position: relative; 
            width: 100%; 
            height: 450px; 
            background-color: #111; 
            overflow: hidden; /* 배너 안의 이미지만 자르고, 전체 스크롤은 건드리지 않음 */
        }
        
        .slide {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 450px;
            background-size: cover; 
            background-position: center;
            opacity: 0; 
            transition: opacity 1.5s ease-in-out;
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        
        .slide.active { opacity: 1; }

        /* [에러 수정 완료] 문법 정확하게 고쳤습니다 */
        .slide::after {
            content: ''; 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 450px; /* 세미콜론 추가 */
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.5)); /* 콜론과 괄호 수정 */
            z-index: 1;
        }

        .content-box { position: relative; z-index: 10; text-align: center; color: #fff; width: 90%; }
        .main-title { font-size: 4vw; font-weight: 800; line-height: 1.2; text-shadow: 0 4px 20px rgba(0,0,0,0.6); margin-bottom: 10px; }
        .sub-text { font-size: 1.5vw; font-weight: 400; opacity: 0.9; text-shadow: 0 2px 10px rgba(0,0,0,0.6); }
        .sub-bar { display: inline-block; height: 4px; width: 60px; background-color: #00aaff; margin-bottom: 20px; }

        @media (max-width: 768px) {
            .main-title { font-size: 28px; }
            .sub-text { font-size: 16px; }
        }
    </style>
</head>
<body>

<div class="banner-wrapper">
    <div class="slide active" style="background-image: url('../images/banner1.jpg');">
        <div class="content-box">
            <div class="sub-bar"></div>
            <div class="main-title">하누리 여행사<br>미국 서부 일주</div>
            <div class="sub-text">웅장한 대자연을 만나는 특별한 여정</div>
        </div>
    </div>
    <div class="slide" style="background-image: url('../images/banner2.jpg');">
        <div class="content-box">
            <div class="sub-bar"></div>
            <div class="main-title">캐나다 로키<br>품격 있는 힐링 여행</div>
            <div class="sub-text">가장 아름다운 호수와 설산을 만나보세요</div>
        </div>
    </div>
</div>

<script>
    (function() {
        let current = 0;
        const bannerContainer = document.querySelector('.banner-wrapper');
        const slides = bannerContainer.querySelectorAll('.slide');

        function nextSlide() {
            if (slides.length <= 1) return;
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }

        if (slides.length > 1) {
            setInterval(nextSlide, 5000);
        }
    })();
</script>

</body>
</html>
