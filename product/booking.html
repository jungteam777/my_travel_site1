<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        body, html {
            margin: 0; padding: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: #fff;
            color: #333;
        }

        #content-wrapper {
            width: 100%;
            min-width: 320px;
            margin: 0 auto;
            overflow: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
            display: flex;
            gap: 40px;
            box-sizing: border-box;
        }

        .image-section { flex: 1.2; width: 100%; position: relative; overflow: hidden; }
        .slider-container {
            position: relative;
            width: 100%;
            height: 450px;
            border-radius: 4px;
            overflow: hidden;
            background-color: #f5f5f5;
        }
        .slider-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.4s ease-out;
        }
        .slider-wrapper img {
            width: 100%;
            height: 100%;
            flex-shrink: 0;
            object-fit: cover;
        }
        .slide-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.3);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .slide-btn.prev { left: 10px; }
        .slide-btn.next { right: 10px; }
        .slider-pagination {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
        }
        .dot.active { background: #fff; width: 20px; border-radius: 10px; }
        .product-code { margin-top: 15px; font-size: 13px; color: #888; }
        .info-section { flex: 1; display: flex; flex-direction: column; width: 100%; }
        .badge-group { display: flex; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        .badge { padding: 4px 10px; font-size: 11px; border-radius: 3px; border: 1px solid #333; font-weight: 600; white-space: nowrap; }
        .badge.black { background: #333; color: #fff; }
        .product-title { font-size: 22px; font-weight: 700; margin-bottom: 10px; line-height: 1.4; word-break: keep-all; }
        .schedule-text { font-weight: 500; color: #333; margin-left: 8px; }
        .hashtags { color: #666; font-size: 14px; margin-bottom: 30px; line-height: 1.5; }
        .booking-box { border: 1px solid #eee; border-radius: 8px; padding: 25px; background: #fff; box-sizing: border-box; }
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 10px; }
        .label { font-size: 16px; font-weight: 600; flex: 1; }
        .unit-price { font-size: 18px; font-weight: 700; margin-right: 5px; white-space: nowrap; }
        .stepper { display: flex; align-items: center; border: 1px solid #ddd; border-radius: 4px; background: #fff; flex-shrink: 0; }
        .stepper button { width: 34px; height: 34px; background: #f9f9f9; border: none; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .stepper input { width: 40px; height: 34px; text-align: center; border: none; font-size: 14px; border-left: 1px solid #ddd; border-right: 1px solid #ddd; outline: none; background: transparent; }
        .total-section { margin-top: 25px; padding-top: 20px; border-top: 1px solid #eee; display: flex; justify-content: space-between; align-items: flex-end; }
        .total-price { font-size: 26px; font-weight: 800; color: #000; }
        .tax-info { font-size: 12px; color: #888; margin-top: 8px; text-align: right; }
        .action-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-booking { flex: 3; background: #222; color: #fff; border: none; padding: 18px; font-size: 18px; font-weight: 700; border-radius: 6px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .btn-wish { flex: 1; background: #fff; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .btn-wish.active { background-color: #FFEB3B; border-color: #FDD835; }
        .btn-wish.active svg { fill: #333; stroke: #333; }
        .product-notice { margin-top: 20px; padding: 15px; background: #fafafa; border-radius: 6px; font-size: 12px; color: #777; line-height: 1.6; }
        .bottom-nav {
            max-width: 1200px;
            margin: 50px auto 0;
            border-top: 1px solid #ddd;
            border-bottom: 2px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            box-sizing: border-box;
        }
        .nav-item { display: flex; align-items: center; gap: 10px; cursor: pointer; color: #555; font-size: 14px; transition: color 0.2s; padding: 0 20px; }
        .nav-item:hover { color: #000; font-weight: 600; }
        .nav-item svg { width: 16px; height: 16px; }
        .modal-mask { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); justify-content: center; align-items: flex-start; }
        .modal-overlay { background-color: #fff; width: 420px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; margin-top: 50px; }
        .modal-header { padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; background-color: #1a1c21; }
        .modal-header h2 { font-size: 18px; font-weight: 700; margin: 0; color: #fff; }
        .btn-close-header { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }
        .modal-body { padding: 30px; }
        .input-text { width: 100%; padding: 14px 18px; font-size: 15px; border: 1px solid #e1e1e1; border-radius: 10px; box-sizing: border-box; margin-bottom: 10px; }
        .btn-submit { width: 100%; background-color: #1a1c21; color: #fff; border: none; padding: 16px; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .alert-mask { display: none; position: fixed; z-index: 20000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); justify-content: center; align-items: flex-start; }
        .alert-box { background: #fff; width: 320px; border-radius: 16px; padding: 30px; text-align: center; margin-top: 50px; }
        .btn-alert-confirm { width: 100%; background: #222; color: #fff; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 20px; }

        @media (max-width: 768px) {
            .container { flex-direction: column; gap: 20px; padding: 0 15px; margin: 10px auto; }
            .slider-container { height: auto; aspect-ratio: 4/3; }
            .product-title { font-size: 19px; }
            .booking-box { padding: 20px 15px; }
            .unit-price { font-size: 16px; }
            .total-price { font-size: 22px; }
            .btn-booking { padding: 15px; font-size: 16px; }
            .bottom-nav { margin: 30px 15px 0; font-size: 13px; }
            .nav-item { padding: 0 10px; }
            .modal-overlay { width: 92%; }
        }
    </style>
</head>
<body>

<div id="content-wrapper">
    <div class="container">
        <div class="image-section">
            <div class="slider-container" id="sliderContainer" onmouseenter="stopAutoSlide()" onmouseleave="startAutoSlide()">
                <div class="slider-wrapper" id="sliderWrapper"></div>
                <button class="slide-btn prev" id="prevBtn" onclick="moveSlide(-1)">&#10094;</button>
                <button class="slide-btn next" id="nextBtn" onclick="moveSlide(1)">&#10095;</button>
                <div class="slider-pagination" id="sliderPagination"></div>
            </div>
            <div class="product-code">상품코드 : <span id="pCode">-</span></div>
        </div>

        <div class="info-section">
            <div class="badge-group">
                <div class="badge black">예약가능</div>
                <div class="badge">항공미정</div>
            </div>
            <div id="pTitle" class="product-title">&nbsp;</div>
            <div id="pDesc" class="hashtags"></div>

            <div class="booking-box">
                <div class="price-row">
                    <span class="label">성인</span>
                    <span class="unit-price"><span id="adultUnitPrice">0</span>원</span>
                    <div class="stepper">
                        <button onclick="changeQty('adult', -1)">-</button>
                        <input type="text" id="adultQty" value="1" readonly>
                        <button onclick="changeQty('adult', 1)">+</button>
                    </div>
                </div>
                <div id="childRow" class="price-row">
                    <span class="label">아동</span>
                    <span class="unit-price"><span id="childDisplayPrice"></span></span>
                    <div class="stepper">
                        <button onclick="changeQty('child', -1)">-</button>
                        <input type="text" id="childQty" value="0" readonly>
                        <button onclick="changeQty('child', 1)">+</button>
                    </div>
                </div>

                <div class="total-section">
                    <span class="total-label">총금액</span>
                    <span id="totalPrice" class="total-price">0원</span>
                </div>
                <div class="tax-info">유류할증료&세공과금포함</div>

                <div class="action-group">
                    <button class="btn-booking" onclick="requestBooking()">예약하기</button>
                    <button id="wishBtn" class="btn-wish" onclick="handleWishClick()">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l8.78-8.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                    </button>
                </div>
                <div class="product-notice">* 1인 객실 사용 시 추가요금 발생합니다.<br>* 아동 요금은 성인 2인과 같은 방 사용 조건입니다.</div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="navProduct('prev')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            이전상품
        </div>
        <div class="nav-item" onclick="navProduct('next')">
            다음상품
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </div>
    </div>
</div>

<div id="loginModal" class="modal-mask">
    <div class="modal-overlay">
        <div class="modal-header"><h2>로그인</h2><button class="btn-close-header" onclick="closeLoginModal()">&times;</button></div>
        <div class="modal-body">
            <input type="text" id="loginId" class="input-text" placeholder="아이디">
            <input type="password" id="loginPassword" class="input-text" placeholder="비밀번호">
            <button class="btn-submit" onclick="submitLogin()">로그인 후 확인하기</button>
        </div>
    </div>
</div>

<div id="alertModal" class="alert-mask">
    <div class="alert-box">
        <div id="alertMessage" class="alert-msg" style="font-weight:500;"></div>
        <button class="btn-alert-confirm" onclick="closeAlert()">확인</button>
    </div>
</div>

<script>
    let baseAdultPrice = 0;
    let baseChildPrice = 0;
    let currentItemData = null; 
    let currentSlide = 0;
    let totalSlides = 0;
    let autoSlideInterval = null;

    window.onload = async function() {
        try {
            const params = new URLSearchParams(window.parent.location.search || window.location.search);
            const productId = params.get('id');

            if (!productId) return;

            const response = await fetch('../json/products.json');
            const allProducts = await response.json();

            const item = allProducts.find(p => String(p["상품코드"]) === String(productId));

            if (item) {
                currentItemData = item;
                renderPage(item);
                checkWishStatus(productId); 
            }
        } catch (error) {
            console.error("데이터 로드 중 오류 발생:", error);
        }
    };

    function renderPage(data) {
        const title = data["상품명"] || '';
        const schedule = data["일정"] ? ` / ${data["일정"]}` : '';
        document.getElementById('pTitle').innerHTML = `${title}<span class="schedule-text">${schedule}</span>`;
        document.getElementById('pDesc').innerText = data["기본설명"] || '';
        document.getElementById('pCode').innerText = data["상품코드"] || '-';

        const wrapper = document.getElementById('sliderWrapper');
        const pagination = document.getElementById('sliderPagination');
        wrapper.innerHTML = '';
        pagination.innerHTML = '';

        let images = [];
        if (Array.isArray(data["상품이미지"])) {
            images = data["상품이미지"].filter(url => url).slice(0, 10);
        } else if (data["상품이미지"]) {
            images = data["상품이미지"].split(',').map(s => s.trim());
        }

        totalSlides = images.length;

        images.forEach((imgUrl, idx) => {
            const imgTag = document.createElement('img');
            imgTag.src = (imgUrl.startsWith('http') || imgUrl.startsWith('img/')) ? imgUrl : '../' + imgUrl;
            imgTag.onerror = function() { this.src = 'https://via.placeholder.com/600x450?text=No+Image'; };
            wrapper.appendChild(imgTag);

            const dot = document.createElement('div');
            dot.className = `dot ${idx === 0 ? 'active' : ''}`;
            dot.onclick = () => {
                currentSlide = idx;
                updateSlide();
                stopAutoSlide();
                startAutoSlide();
            };
            pagination.appendChild(dot);
        });

        const displayMode = totalSlides > 1 ? 'flex' : 'none';
        document.getElementById('prevBtn').style.display = displayMode;
        document.getElementById('nextBtn').style.display = displayMode;
        pagination.style.display = displayMode;

        startAutoSlide();

        baseAdultPrice = Number(data["성인요금"]) || 0;
        baseChildPrice = Number(data["아동요금"]) || 0;
        document.getElementById('adultUnitPrice').innerText = baseAdultPrice.toLocaleString();
        
        const childRow = document.getElementById('childRow');
        childRow.style.display = (baseChildPrice === 0) ? 'none' : 'flex';
        
        updateTotal();
    }

    function moveSlide(step) {
        if (totalSlides <= 1) return;
        currentSlide = (currentSlide + step + totalSlides) % totalSlides;
        updateSlide();
    }

    function updateSlide() {
        const wrapper = document.getElementById('sliderWrapper');
        if(!wrapper) return;
        wrapper.style.transform = `translateX(-${currentSlide * 100}%)`;
        document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === currentSlide));
    }

    function startAutoSlide() {
        if (totalSlides > 1) autoSlideInterval = setInterval(() => moveSlide(1), 3000);
    }

    function stopAutoSlide() {
        clearInterval(autoSlideInterval);
    }

    function changeQty(type, delta) {
        const input = document.getElementById(type + 'Qty');
        let val = parseInt(input.value) + delta;
        if (val < (type === 'adult' ? 1 : 0)) val = (type === 'adult' ? 1 : 0);
        input.value = val;
        updateTotal();
    }

    function updateTotal() {
        const aQty = parseInt(document.getElementById('adultQty').value) || 0;
        const cQty = parseInt(document.getElementById('childQty').value) || 0;
        const total = (aQty * baseAdultPrice) + (cQty * baseChildPrice);
        document.getElementById('totalPrice').innerText = total.toLocaleString() + ' 원';
        
        const childPriceDisplay = document.getElementById('childDisplayPrice');
        if (cQty > 0) childPriceDisplay.innerText = (baseChildPrice * cQty).toLocaleString() + '원';
        else childPriceDisplay.innerText = '';
    }

    function requestBooking() {
        const userStr = localStorage.getItem('loggedInUser');
        const pCode = document.getElementById('pCode').innerText;
        const adultCount = document.getElementById('adultQty').value;
        const childCount = document.getElementById('childQty').value;

        if (!userStr) { 
            alert("회원 전용 서비스입니다."); 
            top.location.href = "../header/login.html"; 
            return; 
        }

        top.location.href = "../booking/index.html?id=" + pCode + "&adult=" + adultCount + "&child=" + childCount;
    }

    // [핵심 수정] 찜목록 버튼 클릭 핸들러 (메인사진 정보 추출 로직 포함)
    async function handleWishClick() {
        const userStr = localStorage.getItem('loggedInUser');
        if (!userStr) {
            alert("로그인 후 이용 가능합니다.");
            top.location.href = "../header/login.html";
            return;
        }

        const userObj = JSON.parse(userStr);
        const userId = userObj["아이디"]; 
        const btn = document.getElementById('wishBtn');
        const pCode = document.getElementById('pCode').innerText;
        const isAdding = !btn.classList.contains('active');

        try {
            const res = await fetch('../json/wishlist.json');
            let wishlist = [];
            if (res.ok) wishlist = await res.json();

            if (isAdding) {
                if (!wishlist.some(w => w["아이디"] === userId && w["상품명"] === currentItemData["상품명"])) {
                    
                    // 현재 상품 데이터에서 첫 번째 이미지 경로 추출 (메인사진으로 사용)
                    let mainImg = "";
                    if (currentItemData["상품이미지"]) {
                        if (Array.isArray(currentItemData["상품이미지"])) {
                            mainImg = currentItemData["상품이미지"][0];
                        } else {
                            mainImg = currentItemData["상품이미지"].split(',')[0].trim();
                        }
                    }
                    
                    // 찜목록 데이터에 "메인사진" 키값 추가하여 저장
                    wishlist.push({
                        "아이디": userId,
                        "상품명": currentItemData["상품명"],
                        "메인사진": mainImg, 
                        "등록일": new Date().toLocaleString(),
                        "상품코드": pCode
                    });
                }
            } else {
                wishlist = wishlist.filter(w => !(w["아이디"] === userId && w["상품명"] === currentItemData["상품명"]));
            }

            const saveRes = await fetch('/save-json', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ filename: 'wishlist.json', data: wishlist })
            });

            if (saveRes.ok) {
                btn.classList.toggle('active');
                alert(isAdding ? "관심 상품에 추가되었습니다." : "관심 상품에서 제거되었습니다.");
            } else {
                alert("찜 목록 업데이트에 실패했습니다.");
            }
        } catch (e) {
            console.error("Wishlist error:", e);
            alert("서버 통신 중 오류가 발생했습니다.");
        }
    }

    async function checkWishStatus(productId) {
        const userStr = localStorage.getItem('loggedInUser');
        if (!userStr) return;
        
        const userObj = JSON.parse(userStr);
        const userId = userObj["아이디"];

        try {
            const res = await fetch('../json/wishlist.json');
            if (res.ok) {
                const wishlist = await res.json();
                if (wishlist.some(w => w["아이디"] === userId && w["상품코드"] === productId)) {
                    document.getElementById('wishBtn').classList.add('active');
                }
            }
        } catch (e) {}
    }

    function navProduct(dir) {
        alert(dir === 'next' ? "다음 상품으로 이동합니다." : "이전 상품으로 이동합니다.");
    }

    function showAlert(msg) { document.getElementById('alertMessage').innerText = msg; document.getElementById('alertModal').style.display = 'flex'; }
    function closeAlert() { document.getElementById('alertModal').style.display = 'none'; }
    function openLoginModal() { document.getElementById('loginModal').style.display = 'flex'; }
    function closeLoginModal() { document.getElementById('loginModal').style.display = 'none'; }
    function submitLogin() { alert("로그인 되었습니다."); closeLoginModal(); }
</script>
</body>
</html>
