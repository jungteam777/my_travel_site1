<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하누리 여행사 - 로그인</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        body, html {
            margin: 0; padding: 0; min-height: 100%;
            font-family: 'Pretendard', sans-serif;
            background-color: #f8fafc; /* 배경색 추가 */
        }

        /* 헤더/푸터 로드 시 레이아웃 깨짐 방지 */
        #header-load { min-height: 60px; }
        #footer-load { margin-top: auto; }

        .login-wrapper {
            width: 100%; min-height: calc(100vh - 200px); /* 헤더/푸터 제외한 영역 확보 */
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center;
            padding: 50px 0;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 50px 40px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%; max-width: 400px;
            text-align: center; border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
        }

        .logo-area { margin-bottom: 30px; }
        .logo-area h1 { font-size: 24px; font-weight: 900; color: #1a4f94; margin: 0; letter-spacing: -0.05em; }
        .logo-area p { font-size: 14px; color: #666; margin-top: 8px; }

        .input-group { position: relative; margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 13px; font-weight: 700; color: #333; margin-bottom: 8px; margin-left: 5px; }
        .input-group input {
            width: 100%; padding: 15px; box-sizing: border-box;
            border: 1px solid #ddd; border-radius: 12px;
            font-size: 15px; outline: none; transition: all 0.3s ease; background: #fdfdfd;
        }
        .input-group input:focus { border-color: #1a4f94; box-shadow: 0 0 0 4px rgba(26, 79, 148, 0.1); background: #fff; }

        .login-btn {
            width: 100%; padding: 16px; background: #1a4f94; color: white;
            border: none; border-radius: 12px; font-size: 16px; font-weight: 700;
            cursor: pointer; transition: all 0.3s ease; margin-top: 10px;
        }
        .login-btn:hover { background: #123a6d; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(26, 79, 148, 0.3); }

        .login-footer { margin-top: 25px; display: flex; justify-content: center; gap: 20px; font-size: 13px; color: #888; }
        .login-footer a { color: #666; text-decoration: none; transition: color 0.2s; cursor: pointer; }
        .login-footer a:hover { color: #1a4f94; font-weight: 700; }

        .hidden { display: none !important; }

        .modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95); border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            z-index: 100; flex-direction: column; padding: 20px; box-sizing: border-box;
        }
        .modal-content { text-align: center; }
        .modal-icon { font-size: 40px; color: #1a4f94; margin-bottom: 15px; }
        .modal-text { font-size: 15px; color: #333; line-height: 1.6; margin-bottom: 25px; word-break: keep-all; }

        @media (max-width: 480px) {
            .login-box { width: 90%; padding: 40px 25px; border-radius: 15px; }
        }
    </style>
</head>
<body>

<div id="header-load"></div>

<div class="login-wrapper">
    <div class="login-box">
        <div id="customModal" class="modal-overlay hidden">
            <div class="modal-content">
                <div class="modal-icon">✔</div>
                <div class="modal-text" id="modalMessage">확인이 완료되었습니다.</div>
                <button class="login-btn" onclick="closeModal()">확인</button>
            </div>
        </div>

        <div id="loginFormArea">
            <div class="logo-area">
                <h1 id="displayLogoText">HANURI TRAVEL</h1>
                <p>다시 만나서 반갑습니다.</p>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label>아이디</label>
                    <input type="text" id="userId" placeholder="아이디를 입력하세요" required>
                </div>
                <div class="input-group">
                    <label>비밀번호</label>
                    <input type="password" id="userPw" placeholder="비밀번호를 입력하세요" required>
                </div>
                <button type="submit" class="login-btn">로그인</button>
            </form>

            <div class="login-footer">
                <a onclick="showFindPw(true)">비밀번호 찾기</a>
                <span>|</span>
                <a href="./header/join.html">회원가입</a>
            </div>
        </div>

        <div id="findPwFormArea" class="hidden">
            <div class="logo-area">
                <h1>Reset Password</h1>
                <p>아이디를 입력하면 비밀번호를 확인해 드립니다.</p>
            </div>
            <form id="findPwForm">
                <div class="input-group">
                    <label>아이디</label>
                    <input type="text" id="resetId" placeholder="아이디를 입력하세요" required>
                </div>
                <button type="submit" class="login-btn">비밀번호 확인</button>
            </form>
            <div class="login-footer">
                <a onclick="showFindPw(false)">Back to Login</a>
            </div>
        </div>
    </div>
</div>

<div id="footer-load"></div>

<script>
    // [기능] 외부 컴포넌트 로드 함수
    async function loadComponent(id, filePath) {
        try {
            const response = await fetch(filePath);
            if (!response.ok) throw new Error(`404: ${filePath} 없음`);
            const htmlContent = await response.text();
            const target = document.getElementById(id);
            target.innerHTML = htmlContent;
            
            // 로드된 HTML 내부의 스크립트 실행
            const scripts = target.querySelectorAll("script");
            for (const oldScript of scripts) {
                const newScript = document.createElement("script");
                Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                newScript.text = oldScript.text;
                oldScript.parentNode.replaceChild(newScript, oldScript);
            }
        } catch (e) { console.error(e); }
    }

    // [기능] 로그인 제출
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('userId').value;
        const pw = document.getElementById('userPw').value;

        try {
            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "아이디": id, "비밀번호": pw })
            });
            const result = await response.json();
            if (result.success) {
                localStorage.setItem('loggedInUser', JSON.stringify(result.user));
                location.href = '../index.html'; 
            } else {
                alert(result.message);
            }
        } catch (err) { alert("서버 연결 실패"); }
    });

    // [기능] 비밀번호 찾기 제출
    document.getElementById('findPwForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('resetId').value;
        try {
            const response = await fetch(`/find-pw?id=${id}`);
            const result = await response.json();
            if (result.success) {
                openModal(`회원님의 비밀번호는 [ ${result.pw} ] 입니다.`);
            } else {
                alert(result.message);
            }
        } catch (err) { alert("서버 연결 실패"); }
    });

    function showFindPw(isFind) {
        document.getElementById('loginFormArea').classList.toggle('hidden', isFind);
        document.getElementById('findPwFormArea').classList.toggle('hidden', !isFind);
    }

    function openModal(msg) {
        document.getElementById('modalMessage').innerText = msg;
        document.getElementById('customModal').classList.remove('hidden');
    }

    function closeModal() {
        document.getElementById('customModal').classList.add('hidden');
        showFindPw(false);
    }

    // 3. 페이지 로드 시 컴포넌트 로드
    window.addEventListener('load', () => {
        loadComponent('header-load', '../header.html');
        loadComponent('footer-load', '../footer.html');
    });
</script>

</body>
</html>
