<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body { margin: 0; font-family: 'Pretendard', sans-serif; background-color: #fcfcfc; padding: 0; color: #111; -webkit-font-smoothing: antialiased; }
        .container { max-width: 1200px; margin: 80px auto; padding: 0 20px; }
        
        .page-header { text-align: center; margin-bottom: 80px; }
        .page-header h1 { font-size: 42px; font-weight: 800; margin: 0 0 15px 0; letter-spacing: -1px; }
        .page-header p { font-size: 18px; color: #888; margin: 0; font-weight: 400; }

        /* 가로 4개 배치 및 간격 조절 */
        .review-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px; 
        }
        
        /* 카드 디자인 전면 수정 */
        .review-card { 
            background: #fff; 
            border-radius: 16px; 
            overflow: hidden; 
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .review-card:hover { 
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            border-color: rgba(0,0,0,0.1);
        }

        /* 카드 높이를 줄이기 위해 이미지 높이 하향 조정 */
        .rev-img { width: 100%; height: 180px; overflow: hidden; background: #f0f0f0; position: relative; }
        .rev-img img { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: transform 0.6s ease;
        }
        .review-card:hover .rev-img img { transform: scale(1.08); }

        /* 내부 여백 및 텍스트 높이 조절 */
        .rev-content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .rev-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .stars { color: #ffb800; font-size: 11px; letter-spacing: 1px; }
        .user-name { color: #aaa; font-size: 12px; font-weight: 500; }

        .rev-title { 
            font-size: 17px; 
            font-weight: 700; 
            color: #111; 
            margin-bottom: 10px; 
            line-height: 1.4; 
            height: 48px; 
            overflow: hidden; 
            display: -webkit-box; 
            -webkit-line-clamp: 2;
            line-clamp: 2; 
            -webkit-box-orient: vertical; 
            letter-spacing: -0.5px;
        }

        .rev-text { 
            font-size: 14px; 
            color: #666; 
            line-height: 1.6; 
            height: 44px; 
            overflow: hidden; 
            display: -webkit-box; 
            -webkit-line-clamp: 2;
            line-clamp: 2; 
            -webkit-box-orient: vertical; 
            margin-bottom: 15px;
        }
        
        .rev-footer { 
            margin-top: auto; 
            padding-top: 15px; 
            border-top: 1px solid #f8f8f8; 
            font-size: 12px; 
            color: #999; 
        }
        .rev-footer b { color: #555; font-weight: 600; margin-left: 4px; }

        .pagination { display: flex; justify-content: center; margin-top: 80px; gap: 12px; }
        .pagination button { 
            width: 48px; height: 48px; 
            border: 1px solid #eee; 
            background: #fff; 
            font-weight: 600; 
            cursor: pointer; 
            border-radius: 50%; 
            transition: 0.3s;
            color: #777;
        }
        .pagination button.active { background: #111; color: #fff; border-color: #111; }
        .pagination button:hover:not(.active):not(:disabled) { border-color: #111; color: #111; }
        .pagination button:disabled { opacity: 0.3; cursor: not-allowed; }

        /* 모달 디자인 세련되게 수정 */
        .modal-overlay { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); 
            display: none; 
            justify-content: center; 
            z-index: 99999; 
            overflow-y: auto;
            backdrop-filter: blur(5px);
        }
        .modal-content { 
            background: #fff; 
            width: 90%; 
            max-width: 900px; 
            position: relative; 
            border-radius: 24px; 
            margin: 50px auto;
            overflow: hidden;
        }
        .modal-close { position: absolute; top: 25px; right: 25px; font-size: 30px; cursor: pointer; color: #fff; border: none; background: rgba(0,0,0,0.5); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; }
        .modal-body { padding: 0; }
        .modal-body img { width: 100%; max-height: 500px; object-fit: cover; display: block; }
        .modal-info-wrap { padding: 50px; }
        .modal-body .m-title { font-size: 32px; font-weight: 800; margin-bottom: 20px; line-height: 1.3; letter-spacing: -1px; }
        .modal-body .m-info { display: flex; justify-content: space-between; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 25px; font-size: 16px; color: #888; }
        .modal-body .m-text { font-size: 17px; color: #444; line-height: 1.9; white-space: pre-wrap; margin-bottom: 40px; }

        .btn-product { 
            display: inline-block; width: 100%; background: #111; color: #fff; 
            text-align: center; padding: 20px 0; font-size: 17px; font-weight: 700; 
            text-decoration: none; transition: 0.3s; border-radius: 12px; border: none; cursor: pointer; 
        }
        .btn-product:hover { background: #333; transform: translateY(-2px); }

        @media (max-width: 1024px) {
            .review-grid { grid-template-columns: repeat(2, 1fr); gap: 25px; }
        }

        @media (max-width: 600px) {
            .container { margin: 50px auto; }
            .page-header h1 { font-size: 32px; }
            .review-grid { grid-template-columns: 1fr; }
            .modal-info-wrap { padding: 30px 20px; }
            .modal-body .m-title { font-size: 24px; }
        }
    </style>
</head>
<body>

<div id="header-load"></div>

<div class="container">
    <div class="page-header">
        <h1>여행 후기</h1>
        <p>고객님들이 직접 남겨주신 소중한 여행 기록입니다.</p>
    </div>
    <div class="review-grid" id="reviewGrid"></div>
    <div class="pagination" id="pagination"></div>
</div>

<div id="footer-load"></div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal-content" id="modalContent">
        <button class="modal-close" onclick="closeModal()">&times;</button>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<script>
    async function loadComponent(id, filePath) {
        try {
            const response = await fetch(filePath);
            if (!response.ok) throw new Error(`404: ${filePath} 없음`);
            const htmlContent = await response.text();
            const target = document.getElementById(id);
            target.innerHTML = htmlContent;
            
            const scripts = target.querySelectorAll("script");
            for (const oldScript of scripts) {
                const newScript = document.createElement("script");
                Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                newScript.text = oldScript.text;
                oldScript.parentNode.replaceChild(newScript, oldScript);
            }
        } catch (e) { console.error(e); }
    }

    const grid = document.getElementById('reviewGrid');
    const pagination = document.getElementById('pagination');
    const modalOverlay = document.getElementById('modalOverlay');
    const modalContent = document.getElementById('modalContent');
    
    let allReviewsData = []; 
    const pageSize = 8; // 가로 4개이므로 한 페이지에 8개씩 보여주는 것이 깔끔합니다.
    let currentPage = 1;     

    function goToProduct(productId) {
        if (!productId) {
            alert("상품 정보를 찾을 수 없습니다.");
            return;
        }
        location.href = `/product/index.html?id=${productId}`;
    }

    function renderReviews(data) {
        grid.innerHTML = ''; 
        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'review-card';
            card.onclick = (e) => openModal(item, card);
            
            const displayImg = item.img || "https://via.placeholder.com/800x600?text=No+Image";
            
            card.innerHTML = `
                <div class="rev-img"><img src="${displayImg}"></div>
                <div class="rev-content">
                    <div class="rev-header">
                        <div class="stars">${item.stars}</div>
                        <div class="user-name">${item.userName}</div>
                    </div>
                    <div class="rev-title">${item.title}</div>
                    <div class="rev-text">${item.content}</div>
                    <div class="rev-footer">방문 상품 <b>${item.productName}</b></div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function renderPagination() {
        pagination.innerHTML = '';
        const totalPages = Math.ceil(allReviewsData.length / pageSize);
        if (totalPages <= 1) return;

        const prevBtn = document.createElement('button');
        prevBtn.innerText = '←';
        prevBtn.disabled = currentPage === 1;
        prevBtn.onclick = () => { currentPage--; updateDisplay(); };
        pagination.appendChild(prevBtn);

        for (let i = 1; i <= totalPages; i++) {
            const btn = document.createElement('button');
            btn.innerText = i;
            if (i === currentPage) btn.className = 'active';
            btn.onclick = () => { currentPage = i; updateDisplay(); };
            pagination.appendChild(btn);
        }

        const nextBtn = document.createElement('button');
        nextBtn.innerText = '→';
        nextBtn.disabled = currentPage === totalPages;
        nextBtn.onclick = () => { currentPage++; updateDisplay(); };
        pagination.appendChild(nextBtn);
    }

    function updateDisplay() {
        const start = (currentPage - 1) * pageSize;
        const end = start + pageSize;
        const pageData = allReviewsData.slice(start, end);
        renderReviews(pageData);
        renderPagination();
        window.scrollTo({top: 0, behavior: 'smooth'}); 
    }

    function openModal(data, cardElement) {
        const modalBody = document.getElementById('modalBody');
        const displayImg = data.img || "https://via.placeholder.com/800x600?text=No+Image";
        
        modalBody.innerHTML = `
            <img src="${displayImg}">
            <div class="modal-info-wrap">
                <div class="m-title">${data.title}</div>
                <div class="m-info">
                    <span style="font-weight:bold; color:#ffb800">${data.stars}</span>
                    <span>${data.userName} | ${data.productName}</span>
                </div>
                <div class="m-text">${data.content}</div>
                <button onclick="goToProduct('${data.productId}')" class="btn-product">이 여행 상품 상세보기</button>
            </div>
        `;
        
        modalOverlay.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        modalOverlay.style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    window.onclick = function(event) {
        if (event.target == modalOverlay) closeModal();
    }

    async function init() {
        try {
            const productRes = await fetch('../json/products.json');
            const products = await productRes.json();

            const reviewRes = await fetch('../json/reviews.json');
            const reviewData = await reviewRes.json();

            allReviewsData = reviewData.map(item => {
                const targetCode = item["상품코드"];
                const matchedProduct = products.find(p => String(p["상품코드"]) === String(targetCode));
                
                let finalImg = "";
                if (matchedProduct && matchedProduct["메인사진"]) {
                    const rawPath = matchedProduct["메인사진"];
                    finalImg = rawPath.startsWith('/') ? rawPath : '/' + rawPath.replace('../', '');
                }
                
                const starCount = parseInt(item["별점"]) || 5;
                return {
                    title: item["제목"],
                    userName: (item["작성자"] || "익명") + " 고객님",
                    stars: '★'.repeat(starCount) + '☆'.repeat(5 - starCount),
                    productName: matchedProduct ? matchedProduct["상품명"] : "정보 없음",
                    img: finalImg,
                    content: item["내용"],
                    productId: targetCode
                };
            });

            currentPage = 1;
            updateDisplay();
        } catch (error) {
            console.error("데이터 로드 실패:", error);
        }
    }

    window.addEventListener('load', () => {
        loadComponent('header-load', '../header.html');
        loadComponent('footer-load', '../footer.html');
        init();
    });
</script>
</body>
</html>
