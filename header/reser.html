<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>하누리 여행사 - 예약 내역 조회</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; background-color: #f8fafc; color: #1e293b; }
        
        .res-container { max-width: 1000px; margin: 50px auto; padding: 30px 20px; background: #fff; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        .res-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid #f1f5f9; }
        .res-title { font-size: 24px; font-weight: 800; color: #1a4f94; letter-spacing: -1px; margin: 0; }
        .res-count { font-size: 14px; color: #64748b; }
        .res-count b { color: #1a4f94; }

        .res-card { background-color: #ffffff; border-radius: 16px; padding: 24px; margin-bottom: 20px; border: 1px solid #eceff1; box-shadow: 0 2px 8px rgba(0,0,0,0.04); transition: 0.2s; cursor: pointer; }
        .res-card:hover { border-color: #1a4f94; box-shadow: 0 8px 16px rgba(26,79,148,0.06); }
        
        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
        .res-code { font-size: 13px; font-weight: 600; color: #94a3b8; }
        .status-badge { font-size: 14px; font-weight: 800; padding: 8px 16px; border-radius: 10px; min-width: 80px; text-align: center; }
        .status-ready { background-color: #f0f9ff; color: #0369a1; border: 1px solid #bae6fd; }
        .status-confirm { background-color: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
        
        .card-mid { display: flex; gap: 16px; margin-bottom: 20px; }
        .prod-img { width: 90px; height: 90px; border-radius: 12px; object-fit: cover; flex-shrink: 0; background-color: #f8fafc; }
/* 45번째 줄 근처 */
.prod-name { 
    font-size: 17px; 
    font-weight: 700; 
    color: #1e293b; 
    line-height: 1.4; 
    margin: 0 0 8px 0; 
    display: -webkit-box; 
    line-clamp: 2; /* 이 줄을 추가하세요 */
    -webkit-line-clamp: 2; 
    -webkit-box-orient: vertical; 
    overflow: hidden; 
    text-overflow: ellipsis; 
    word-break: keep-all; 
}
        .res-date { font-size: 14px; color: #64748b; margin-bottom: 4px; }
        
        .card-bot { display: flex; justify-content: space-between; align-items: flex-end; padding-top: 18px; border-top: 1px solid #f8fafc; }
        .info-group { display: flex; flex-direction: column; gap: 4px; }
        .info-item { font-size: 13px; color: #64748b; }
        .info-item b { color: #334155; margin-left: 6px; font-weight: 600; }
        
        .price-section { text-align: right; }
        .price-label { font-size: 11px; color: #94a3b8; margin-bottom: 2px; }
        .price-value { font-size: 22px; font-weight: 900; color: #000; line-height: 1; }
        .price-value span { font-size: 15px; margin-left: 2px; }

        #detailView { display: none; }
        .receipt-container { padding: 25px; border: 1px solid #e5e7eb; border-radius: 20px; background: #fff; }
        .res-no-box { text-align: center; padding: 25px 0; }
        .res-no-label { font-size: 15px; color: #6b7280; font-weight: 500; }
        .res-no-value { font-size: 24px; font-weight: 900; color: #1a4f94; margin-top: 8px; letter-spacing: 1px; }
        .receipt-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        .receipt-table th { text-align: center; padding: 12px 5px; font-size: 13px; color: #6b7280; border-bottom: 1px solid #e5e7eb; }
        .receipt-table td { text-align: center; padding: 15px 5px; border-bottom: 1px solid #f3f4f6; font-weight: 700; font-size: 14px; }
        .info-grid-box { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 600px) { .info-grid-box { grid-template-columns: 1fr; } }
        .info-card { padding: 20px; background: #fafafa; border-radius: 18px; border: 1px solid #f3f4f6; }
        .info-card h3 { font-size: 16px; margin: 0 0 15px 0; border-left: 5px solid #1a4f94; padding-left: 12px; }
        .info-item-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 15px; }
        .back-btn { margin-top: 20px; width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; background: #fff; cursor: pointer; font-weight: 700; color: #64748b; }
    </style>
</head>
<body>

<div id="header-load"></div>

<div class="res-container">
    <div id="listView">
        <div class="res-header">
            <h1 class="res-title">예약내역조회</h1>
            <span class="res-count">전체 <b id="totalCount">0</b>건</span>
        </div>
        <div id="resList"><p style="text-align:center; padding:100px 0; color:#94a3b8;">데이터를 불러오는 중입니다...</p></div>
    </div>

    <div id="detailView">
        <div class="res-header">
            <h1 class="res-title">예약 상세 내역</h1>
        </div>
        <div class="receipt-container">
            <div class="res-no-box">
                <span class="res-no-label">예약 번호</span>
                <div id="out-res-no" class="res-no-value">-</div>
            </div>
            <table class="receipt-table">
                <thead>
                    <tr><th style="width:40%">상품명</th><th>출발 날짜</th><th>인원</th><th>상태</th></tr>
                </thead>
                <tbody>
                    <tr>
                        <td id="receipt-pname" style="text-align:left;">-</td>
                        <td id="out-date">-</td>
                        <td id="out-people">-</td>
                        <td id="out-status" style="color:#1a4f94">-</td>
                    </tr>
                </tbody>
            </table>
            <div class="info-grid-box">
                <div class="info-card">
                    <h3>결제 정보</h3>
                    <div class="info-item-row"><span>결제 방식</span><b id="out-pay">-</b></div>
                    <div class="info-item-row"><span>예약 날짜</span><b id="out-reg-date">-</b></div>
                    <div class="info-item-row"><span>총 결제금액</span><b id="receipt-total">-</b></div>
                </div>
                <div class="info-card">
                    <h3>예약자 정보</h3>
                    <div class="info-item-row"><span>성함</span><b id="out-name">-</b></div>
                    <div class="info-item-row"><span>연락처</span><b id="out-phone">-</b></div>
                </div>
            </div>
            <button class="back-btn" onclick="showList()"><i class="fa-solid fa-chevron-left"></i> 목록으로 돌아가기</button>
        </div>
    </div>
</div>

<div id="footer-load"></div>

<script>
    async function loadComponent(id, filePath) {
        try {
            const response = await fetch(filePath);
            if (!response.ok) throw new Error(`404: ${filePath} 없음`);
            const htmlContent = await response.text();
            const target = document.getElementById(id);
            target.innerHTML = htmlContent;
            
            const scripts = target.querySelectorAll("script");
            for (const oldScript of scripts) {
                const newScript = document.createElement("script");
                Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                newScript.text = oldScript.text;
                oldScript.parentNode.replaceChild(newScript, oldScript);
            }
        } catch (e) { console.error(e); }
    }

    let allData = [];
    let myData = []; 

    async function fetchBookings() {
        const user = JSON.parse(localStorage.getItem('loggedInUser'));
        if (!user) {
            alert("로그인이 필요한 페이지입니다.");
            location.href = "../header/login.html";
            return;
        }

        try {
            const response = await fetch(`/json/bookings.json?t=${Date.now()}`);
            if (!response.ok) throw new Error();
            
            allData = await response.json();
            myData = allData.filter(item => item["아이디"] === user["아이디"]);
            
            renderList();
        } catch (e) {
            document.getElementById('resList').innerHTML = '<p style="text-align:center; padding:100px 0; color:#94a3b8;">예약 내역이 없습니다.</p>';
        }
    }

    function renderList() {
        document.getElementById('totalCount').innerText = myData.length;

        if (myData.length === 0) {
            document.getElementById('resList').innerHTML = '<p style="text-align:center; padding:100px 0; color:#94a3b8;">조회된 예약 내역이 없습니다.</p>';
            return;
        }

        const listHtml = myData.map((item, index) => {
            const price = Number(item["총금액"] || 0).toLocaleString();
            
            // 이미지 경로 수정: 상위 폴더(../)를 붙여 최상위 images 폴더를 찾도록 함
            const finalImgSrc = item["이미지"] ? `../${item["이미지"]}` : '';
            
            return `
            <div class="res-card" onclick="viewDetail(${index})">
                <div class="card-top">
                    <span class="res-code">${item["예약번호"] || 'N/A'}</span>
                    <span class="status-badge ${item["예약상태"] === '예약완료' ? 'status-confirm' : 'status-ready'}">${item["예약상태"] || '예약접수'}</span>
                </div>
                <div class="card-mid">
                    <img src="${finalImgSrc}" class="prod-img" onerror="this.src='https://via.placeholder.com/90'">
                    <div class="prod-info">
                        <h2 class="prod-name">${item["상품명"] || '상품 정보 없음'}</h2>
                        <div class="res-date">예약일: ${item["신청일"] || '-'}</div>
                        <div class="res-date">출발일: ${item["출발날짜"] || '-'}</div>
                    </div>
                </div>
                <div class="card-bot">
                    <div class="info-group">
                        <div class="info-item">예약인원 <b>성인 ${item["성인수"] || 0} / 아동 ${item["아동수"] || 0}</b></div>
                        <div class="info-item">결제수단 <b>${item["결제수단"] || '-'}</b></div>
                    </div>
                    <div class="price-section">
                        <div class="price-label">총 결제금액</div>
                        <div class="price-value">${price}<span>원</span></div>
                    </div>
                </div>
            </div>`;
        }).join('');
        
        document.getElementById('resList').innerHTML = listHtml;
    }

    async function viewDetail(index) {
        const item = myData[index];
        if(!item) return;

        try {
            const response = await fetch(`/json/members.json?t=${Date.now()}`);
            const members = await response.json();
            const memberInfo = members.find(m => m["아이디"] === item["아이디"]);

            document.getElementById('out-res-no').innerText = item["예약번호"] || '-';
            document.getElementById('receipt-pname').innerText = item["상품명"] || '-';
            document.getElementById('out-date').innerText = item["출발날짜"] || '-';
            document.getElementById('out-people').innerText = `성인 ${item["성인수"] || 0} / 아동 ${item["아동수"] || 0}`;
            document.getElementById('out-status').innerText = item["예약상태"] || '예약접수';
            document.getElementById('out-pay').innerText = item["결제수단"] || '-';
            document.getElementById('receipt-total').innerText = Number(item["총금액"] || 0).toLocaleString() + '원';
            
            // 이미지 요청 사항대로 '결제 정보' 섹션에 '예약 날짜' 삽입
            document.getElementById('out-reg-date').innerText = item["신청일"] || '-';
            
            document.getElementById('out-name').innerText = memberInfo ? memberInfo["이름"] : (item["이름"] || '-');
            document.getElementById('out-phone').innerText = memberInfo ? memberInfo["휴대폰"] : (item["연락처"] || '-');

        } catch (e) {
            console.error("데이터 로드 실패", e);
        }

        document.getElementById('listView').style.display = 'none';
        document.getElementById('detailView').style.display = 'block';
        window.scrollTo(0, 0);
    }

    function showList() {
        document.getElementById('detailView').style.display = 'none';
        document.getElementById('listView').style.display = 'block';
        window.scrollTo(0, 0);
    }

    window.addEventListener('load', () => {
        loadComponent('header-load', '../header.html');
        loadComponent('footer-load', '../footer.html');
        fetchBookings();
    });
</script>
</body>
</html>
