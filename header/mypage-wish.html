<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; background-color: #ffffff; color: #1e293b; }
        
        /* 헤더 아래 여백을 위한 컨테이너 수정 */
        .wish-container { max-width: 1000px; margin: 50px auto; padding: 20px; box-sizing: border-box; min-height: 600px; }
        
        .wish-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #f1f5f9; 
        }
        .wish-title { font-size: 22px; font-weight: 800; color: #000; letter-spacing: -1px; margin: 0; }
        
        #wishList { 
            height: 520px; 
            overflow-y: auto; 
            padding-right: 10px;
        }

        #wishList::-webkit-scrollbar { width: 5px; }
        #wishList::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        #wishList::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        #wishList::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .wish-card { 
            display: flex; gap: 20px; background-color: #ffffff; 
            border-radius: 16px; padding: 15px; margin-bottom: 12px; 
            border: 1px solid #eceff1; transition: 0.2s; position: relative; cursor: pointer;
        }
        .wish-card:last-child { margin-bottom: 0; }
        .wish-card:hover { border-color: #003366; box-shadow: 0 8px 16px rgba(0,51,102,0.06); }
        
        .wish-img { 
            width: 110px; height: 82px; border-radius: 12px; 
            object-fit: cover; flex-shrink: 0; background-color: #f8fafc; 
        }
        
        .wish-info { 
            flex: 1; display: flex; flex-direction: column; 
            justify-content: center; min-width: 0; 
        }
        .wish-name { 
    font-size: 16px; 
    font-weight: 700; 
    color: #1e293b; 
    margin: 0 0 8px 0; 
    line-height: 1.4;
    display: -webkit-box; 
    line-clamp: 2; /* 표준 속성 추가 */
    -webkit-line-clamp: 2; 
    -webkit-box-orient: vertical;
    overflow: hidden;
}
        .wish-date { font-size: 12px; color: #94a3b8; font-weight: 500; }
        
        .delete-btn { 
            position: absolute; right: 15px; bottom: 15px; 
            width: 32px; height: 32px; display: flex; 
            align-items: center; justify-content: center; 
            color: #94a3b8; font-size: 16px; cursor: pointer; 
            transition: 0.2s; border-radius: 50%;
        }
        .delete-btn:hover { color: #ef4444; background: #fef2f2; }

        .empty-msg { text-align: center; padding: 100px 0; color: #94a3b8; }
    </style>
</head>
<body>

<div id="header-load"></div>

    <div class="wish-container">
        <div class="wish-header">
            <h1 class="wish-title">찜목록</h1>
            <span id="totalCount" style="font-weight: 700; color: #64748b; font-size: 14px;">전체 0건</span>
        </div>
        <div id="wishList">
            <p class="empty-msg">찜한 상품을 불러오는 중입니다...</p>
        </div>
    </div>

<div id="footer-load"></div>

<script>
    // [공통] 외부 HTML 로드 함수
    async function loadComponent(id, filePath) {
        try {
            const response = await fetch(filePath);
            if (!response.ok) throw new Error(`404: ${filePath} 없음`);
            const htmlContent = await response.text();
            const target = document.getElementById(id);
            target.innerHTML = htmlContent;
            const scripts = target.querySelectorAll("script");
            for (const oldScript of scripts) {
                const newScript = document.createElement("script");
                Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                newScript.text = oldScript.text;
                oldScript.parentNode.replaceChild(newScript, oldScript);
            }
        } catch (e) { console.error(e); }
    }

    let wishlistData = [];
    const currentLogin = JSON.parse(localStorage.getItem("loggedInUser") || "null");

    // 페이지 로드 시 실행
    document.addEventListener("DOMContentLoaded", () => {
        loadComponent('header-load', '../header.html');
        loadComponent('footer-load', '../footer.html');
        loadWishlist();
    });

    // 서버에서 찜 목록 데이터를 가져오는 함수
    async function loadWishlist() {
        if (!currentLogin) {
            document.getElementById('wishList').innerHTML = '<p class="empty-msg">로그인이 필요합니다.</p>';
            return;
        }

        try {
            // 1. 찜 목록과 상품 목록을 동시에 가져옴
            const [wishRes, prodRes] = await Promise.all([
                fetch('/json/wishlist.json'),
                fetch('/json/products.json')
            ]);

            if (!wishRes.ok) throw new Error("찜 목록 파일 없음");
            const allWish = await wishRes.json();
            
            // 현재 로그인한 아이디와 일치하는 데이터만 필터링
            const userWish = allWish.filter(item => item["아이디"] === currentLogin["아이디"]);

            // 2. 상품 데이터가 정상적으로 로드되었다면 사진 매칭 로직 실행
            if (prodRes.ok) {
                const allProducts = await prodRes.json();
                wishlistData = userWish.map(wishItem => {
                    // products.json에서 상품코드가 일치하는 상품 찾기
                    const productInfo = allProducts.find(p => p["상품코드"] === wishItem["상품코드"]);
                    if (productInfo) {
                        // 찾았다면 해당 상품의 '메인사진'을 데이터에 추가
                        return { ...wishItem, "메인사진": productInfo["메인사진"] };
                    }
                    return wishItem;
                });
            } else {
                wishlistData = userWish;
            }

            renderWishlist();
        } catch (e) {
            console.log("찜 목록을 불러올 수 없습니다.", e);
            wishlistData = [];
            renderWishlist();
        }
    }

    function renderWishlist() {
        if (wishlistData.length === 0) {
            document.getElementById('wishList').innerHTML = '<p class="empty-msg">찜한 상품이 없습니다.</p>';
            document.getElementById('totalCount').innerText = "전체 0건";
            return;
        }

        const listHtml = wishlistData.map((item, index) => {
            const dateStr = item["등록일"] || "최근 등록";
            
            // 이미지 경로 수정: 상위 폴더(../)를 붙여 최상위 images 폴더를 찾도록 함
            const imagePath = item["메인사진"] || item["이미지"] || '';
            const finalImgSrc = imagePath ? `../${imagePath}` : '';

            return `
            <div class="wish-card" onclick="goToProduct('${item["상품코드"]}')">
                <img src="${finalImgSrc}" class="wish-img">
                <div class="wish-info">
                    <h2 class="wish-name">${item["상품명"] || '상품명 없음'}</h2>
                    <div class="wish-date">${dateStr}</div>
                </div>
                <div class="delete-btn" onclick="deleteItem(event, ${index})">
                    <i class="fa-regular fa-trash-can"></i>
                </div>
            </div>`;
        }).join('');
        
        document.getElementById('wishList').innerHTML = listHtml;
        document.getElementById('totalCount').innerText = `전체 ${wishlistData.length}건`;
    }

    // [수정] 상품 상세 페이지로 이동 (id 파라미터로 변경)
    function goToProduct(productCode) {
        if(productCode) {
            location.href = `../product/index.html?id=${productCode}`;
        }
    }

    // 찜 목록에서 삭제
    async function deleteItem(event, index) {
        event.stopPropagation();
        if(!confirm("찜 목록에서 삭제할까요?")) return;

        const targetItem = wishlistData[index];
        
        try {
            const res = await fetch('/json/wishlist.json');
            let allWish = [];
            if (res.ok) allWish = await res.json();

            // 아이디와 상품명이 일치하는 항목만 제거
            const updatedWish = allWish.filter(item => 
                !(item["아이디"] === currentLogin["아이디"] && item["상품명"] === targetItem["상품명"])
            );

            const saveRes = await fetch('/save-json', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    filename: 'wishlist.json',
                    data: updatedWish
                })
            });

            if (saveRes.ok) {
                wishlistData.splice(index, 1);
                renderWishlist();
            } else {
                alert("삭제 처리에 실패했습니다.");
            }
        } catch (e) {
            alert("서버 연결 오류");
        }
    }
</script>
</body>
</html>
