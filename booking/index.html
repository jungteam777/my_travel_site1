<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Booking System</title>
    <style>
        :root {
            --primary: #000000;
            --accent: #1d4ed8;
            --bg-body: #ffffff;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-sub: #6b7280;
            --border-light: #f3f4f6;
            --border-dark: #e5e7eb;
        }

        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: var(--bg-body); margin: 0; padding: 0; color: var(--text-main); -webkit-font-smoothing: antialiased; box-sizing: border-box; }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        
        h1 { font-size: 28px; font-weight: 800; text-align: center; margin-bottom: 35px; letter-spacing: -0.8px; }
        .white-card { background: var(--card-bg); border: 1px solid var(--border-light); border-radius: 20px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.04); overflow: hidden; }
        .product-header { display: flex; align-items: center; justify-content: space-between; padding: 25px; margin-bottom: 24px; border: 1px solid var(--border-dark); gap: 15px; }

        @media (max-width: 600px) {
            .product-header { flex-direction: column; align-items: flex-start; padding: 20px; }
            .p-info { width: 100%; }
            .p-meta { width: 100%; text-align: left !important; padding-left: 0 !important; margin-top: 15px; border-top: 1px solid var(--border-light); padding-top: 15px; }
            h1 { font-size: 24px; margin-top: 10px; }
        }

        .p-info { display: flex; align-items: center; gap: 18px; flex: 1; min-width: 0; }
        .p-info img { width: 85px; height: 85px; object-fit: cover; border-radius: 14px; background: #eee; flex-shrink: 0; }
        .p-text-group { min-width: 0; }
        .p-info h2 { font-size: 18px; font-weight: 700; margin: 0; line-height: 1.4; word-break: keep-all; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .p-people-text { color: var(--text-sub); font-size: 14px; margin-top: 6px; font-weight: 500; }
        .p-meta { text-align: right; flex-shrink: 0; padding-left: 10px; }
        .p-meta .val { font-size: 22px; font-weight: 800; color: var(--primary); display: block; }
        .p-meta .tax-info { display: block; font-size: 11px; color: var(--text-sub); margin-top: 4px; }

        .layout-grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 20px; align-items: start; }
        @media (max-width: 768px) { .layout-grid { grid-template-columns: 1fr; } }
        .form-body { padding: 25px; border: 1px solid var(--border-dark); }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 15px; font-weight: 700; margin-bottom: 8px; color: #374151; }
        .input-group input, .input-group textarea { width: 100%; padding: 15px; border: 1px solid var(--border-dark); border-radius: 12px; font-size: 16px; box-sizing: border-box; background-color: #fafafa; font-family: inherit; }

        .side-card { padding: 25px; border: 1px solid var(--border-dark); position: sticky; top: 20px; }
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 18px; border-bottom: 1px solid var(--border-light); }
        .price-row strong { font-size: 26px; font-weight: 900; color: var(--primary); }
        
        .method-option { display: flex; flex-direction: column; padding: 15px; border: 1px solid var(--border-dark); border-radius: 14px; margin-bottom: 12px; cursor: pointer; transition: 0.2s; font-size: 16px; font-weight: 600; }
        .method-option div { display: flex; align-items: center; }
        .method-option input { width: 18px; height: 18px; margin-right: 12px; }
        .mileage-info { font-size: 13px; color: var(--accent); margin-top: 8px; padding-left: 30px; display: none; font-weight: 700; }

        .btn { width: 100%; padding: 18px; border-radius: 14px; font-size: 18px; font-weight: 700; cursor: pointer; border: none; transition: 0.2s; box-sizing: border-box; }
        .btn-black { background: var(--primary); color: #fff; margin-bottom: 12px; }
        .btn-light { background: #fff; color: var(--text-sub); border: 1px solid var(--border-dark); }

        .receipt-container { padding: 20px; border: 1px solid var(--border-dark); }
        .receipt-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        .receipt-table th { text-align: center; padding: 12px 5px; font-size: 13px; color: var(--text-sub); border-bottom: 1px solid var(--border-dark); }
        .receipt-table td { text-align: center; padding: 15px 5px; border-bottom: 1px solid var(--border-light); font-weight: 700; font-size: 14px; }
        .notice-box { padding: 15px; border-radius: 12px; margin-top: 20px; text-align: center; font-size: 14px; line-height: 1.6; font-weight: 600; }
    </style>
</head>
<body>

    <div id="header-load"></div>

    <div class="container">
        <div id="step1-view">
            <h1>예약하기</h1>
            <form name="tour-booking" method="POST" data-netlify="true" id="booking-form">
                <div class="product-header white-card">
                    <div class="p-info">
                        <img id="main-product-img" src="../images/default-tour.webp" alt="Tour">
                        <div class="p-text-group">
                            <h2 id="display-pname">상품명을 선택해주세요</h2>
                            <p class="p-people-text">성인 <span id="display-in-adult">0</span> / 아동 <span id="display-in-child">0</span></p>
                        </div>
                    </div>
                    <div class="p-meta">
                        <span id="header-price" class="val">0원</span>
                        <span class="tax-info">유류할증료&세공과금포함</span>
                    </div>
                </div>

                <div class="layout-grid">
                    <div class="white-card form-body">
                        <div class="input-group"><label>성함</label><input type="text" name="name" id="in-name" placeholder="실명을 입력해주세요" required></div>
                        <div class="input-group"><label>휴대폰</label><input type="tel" name="phone" id="in-phone" placeholder="숫자만 입력해주세요" required></div>
                        <div class="input-group"><label>이메일</label><input type="email" name="email" id="in-email" placeholder="example@email.com" required></div>
                        <div class="input-group"><label>출발 날짜</label><input type="date" name="travel_date" id="in-date" required></div>
                        <div class="input-group"><label>요청사항</label><textarea name="requests" id="in-requests" rows="4" placeholder="기타 문의사항을 적어주세요"></textarea></div>
                        
                        <input type="hidden" name="product_name" id="hidden-pname">
                        <input type="hidden" name="total_price" id="hidden-price">
                        <input type="hidden" name="reservation_no" id="hidden-res-no">
                    </div>

                    <div class="white-card side-card">
                        <div class="price-row"><span>총 결제금액</span><strong id="side-total-price">0원</strong></div>
                        <div class="method-group">
                            <label class="method-option">
                                <div><input type="radio" name="pay" value="마일리지" checked onchange="togglePayInfo()"><span>✨ 마일리지 사용</span></div>
                                <span id="mileage-balance" class="mileage-info">보유 마일리지: 0원</span>
                            </label>
                            <label class="method-option">
                                <div><input type="radio" name="pay" value="무통장" onchange="togglePayInfo()"><span>🏦 무통장 입금</span></div>
                            </label>
                        </div>
                        <div id="side-notice-bank" class="notice-box" style="display:none; background:#f8fafc; margin-bottom:15px; border:1px solid #e2e8f0;">
                            예약확정 후 계좌문의는 아래 상담창에 문의하세요
                        </div>
                        <button type="button" class="btn btn-black" onclick="processBooking()">예약 확약하기</button>
                        <button type="button" class="btn btn-light" onclick="window.history.back()">취소하기</button>
                    </div>
                </div>
            </form>
        </div>

        <div id="step2-view" style="display:none;">
            <h1>예약 완료</h1>
            <div class="white-card receipt-container">
                <div style="text-align:center; padding: 25px 0;">
                    <span style="font-size: 15px; color: var(--text-sub); font-weight: 500;">예약 번호</span>
                    <div id="out-res-no" style="font-size: 24px; font-weight: 900; color: var(--accent); margin-top: 8px; letter-spacing: 1px;">-</div>
                </div>
                <table class="receipt-table">
                    <thead><tr><th style="width:40%">상품명</th><th>출발 날짜</th><th>인원</th><th>상태</th></tr></thead>
                    <tbody><tr><td id="receipt-pname" style="text-align:left;">-</td><td id="out-date">-</td><td id="out-people">-</td><td id="out-status" style="color:var(--accent)">-</td></tr></tbody>
                </table>
                <div id="notice-bank" class="notice-box" style="display:none; background: #fff; border: 1px solid var(--border-dark);">상세 계좌 정보는 예약 확정 후 제공됩니다.</div>
                <div id="notice-mileage" class="notice-box" style="display:none; background: #f0fdf4; border: 1px solid #bbf7d0;">마일리지가 정상 차감되었습니다.</div>
                <button class="btn btn-black" style="margin-top:20px;" onclick="location.href='/'">홈으로 이동</button>
            </div>
        </div>
    </div>

    <div id="footer-load"></div>

    <script>
        let userMileage = 0;
        let rawTotalPrice = 0;

        async function loadComponent(id, filePath) {
            try {
                const response = await fetch(filePath);
                const htmlContent = await response.text();
                const target = document.getElementById(id);
                target.innerHTML = htmlContent;
                
                const scripts = target.querySelectorAll("script");
                for (const oldScript of scripts) {
                    const newScript = document.createElement("script");
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    newScript.text = oldScript.text;
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                }
            } catch (e) { console.error(e); }
        }

        window.addEventListener('load', async () => {
            loadComponent('header-load', '../header.html');
            loadComponent('footer-load', '../footer.html');

            const params = new URLSearchParams(window.location.search);
            const productId = params.get('id');
            const adultCount = parseInt(params.get('adult')) || 1;
            const childCount = parseInt(params.get('child')) || 0;

            const loginData = localStorage.getItem('loggedInUser');
            let loginId = "";
            if (loginData) {
                const parsed = JSON.parse(loginData);
                loginId = parsed["아이디"];
            }

            if (loginId) {
                try {
                    const resMem = await fetch('../json/members.json');
                    const members = await resMem.json();
                    const user = members.find(m => String(m["아이디"]) === String(loginId));
                    if (user) {
                        document.getElementById('in-name').value = user["이름"] || "";
                        document.getElementById('in-phone').value = user["휴대폰"] || "";
                        document.getElementById('in-email').value = user["이메일"] || "";
                        userMileage = parseInt(user["마일리지"]) || 0;
                        document.getElementById('mileage-balance').innerText = `보유 마일리지: ${userMileage.toLocaleString()}원`;
                    }
                } catch (e) { console.error("회원정보 로드 실패", e); }
            }

            if (productId) {
                try {
                    const resProd = await fetch('../json/products.json');
                    const products = await resProd.json();
                    const item = products.find(p => String(p["상품코드"]) === String(productId));

                    if (item) {
                        const pName = item["상품명"];
                        document.getElementById('display-pname').innerText = pName;
                        document.getElementById('receipt-pname').innerText = pName;
                        document.getElementById('hidden-pname').value = pName;
                        
                        if (item["메인사진"]) {
                            document.getElementById('main-product-img').src = "../" + item["메인사진"];
                        }

                        document.getElementById('display-in-adult').innerText = adultCount;
                        document.getElementById('display-in-child').innerText = childCount;

                        const adultPrice = parseInt(item["성인요금"]) || 0;
                        const childPrice = parseInt(item["아동요금"]) || 0;
                        rawTotalPrice = (adultPrice * adultCount) + (childPrice * childCount);

                        const formattedPrice = rawTotalPrice.toLocaleString() + '원';
                        document.getElementById('header-price').innerText = formattedPrice;
                        document.getElementById('side-total-price').innerText = formattedPrice;
                        document.getElementById('hidden-price').value = rawTotalPrice;
                    }
                } catch (e) { console.error("상품정보 로드 실패", e); }
            }
            togglePayInfo();
        });

        function togglePayInfo() {
            const payOption = document.querySelector('input[name="pay"]:checked');
            if(!payOption) return;
            const payVal = payOption.value;
            document.getElementById('mileage-balance').style.display = (payVal === '마일리지') ? 'block' : 'none';
            document.getElementById('side-notice-bank').style.display = (payVal === '무통장') ? 'block' : 'none';
        }

        async function processBooking() {
            if (!document.getElementById('in-name').value) { alert("성함을 입력해주세요."); return; }
            if (!document.getElementById('in-date').value) { alert("날짜를 선택해주세요."); return; }

            const payVal = document.querySelector('input[name="pay"]:checked').value;
            
            if (payVal === '마일리지' && userMileage < rawTotalPrice) {
                alert("마일리지가 부족합니다. 무통장 입금을 이용해주세요.");
                return;
            }

            const resNo = new Date().toISOString().slice(0,10).replace(/-/g,"") + "-" + Math.random().toString(36).substring(2, 6).toUpperCase();
            document.getElementById('out-res-no').innerText = resNo;
            document.getElementById('hidden-res-no').value = resNo;

            const bookingStatus = (payVal === '마일리지') ? '예약완료' : '예약접수';
            document.getElementById('out-status').innerText = bookingStatus;

            // -----------------------------------------------------------------
            // [수정] 신청일(실시간 날짜/시간) 필드 추가
            // -----------------------------------------------------------------
            const currentLogin = JSON.parse(localStorage.getItem('loggedInUser') || '{}');
            const serverBookingData = {
                "예약번호": resNo,
                "아이디": currentLogin["아이디"] || "guest",
                "상품명": document.getElementById('hidden-pname').value,
                "출발날짜": document.getElementById('in-date').value,
                "성인수": parseInt(document.getElementById('display-in-adult').innerText),
                "아동수": parseInt(document.getElementById('display-in-child').innerText),
                "총금액": rawTotalPrice,
                "결제수단": payVal,
                "예약상태": bookingStatus,
                "이미지": document.getElementById('main-product-img').getAttribute('src').replace('../', ''),
                "신청일": new Date().toLocaleString() // 실시간 신청 시점 저장
            };

            // 1. 서버 bookings.json에 물리적 저장
            try {
                await fetch('/api/booking', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(serverBookingData)
                });
            } catch (e) { console.error("서버 예약 저장 실패", e); }

            // 2. localStorage에 저장
            const localBookingData = {
                ...serverBookingData,
                people: `성인 ${serverBookingData["성인수"]} / 아동 ${serverBookingData["아동수"]}`
            };
            let currentBookings = JSON.parse(localStorage.getItem('myBookings')) || [];
            currentBookings.push(localBookingData);
            localStorage.setItem('myBookings', JSON.stringify(currentBookings));

            // Netlify 전송 (백업용)
            const form = document.getElementById('booking-form');
            const formData = new FormData(form);
            formData.append('status', bookingStatus);
            formData.append('applied_at', serverBookingData["신청일"]); // Netlify 폼에도 추가
            fetch("/", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: new URLSearchParams(formData).toString(),
            }).catch(e => console.error(e));

            // 화면 전환
            document.getElementById('step1-view').style.display = 'none';
            document.getElementById('step2-view').style.display = 'block';

            document.getElementById('notice-bank').style.display = (payVal === '무통장') ? 'block' : 'none';
            document.getElementById('notice-mileage').style.display = (payVal === '마일리지') ? 'block' : 'none';
            document.getElementById('out-date').innerText = document.getElementById('in-date').value;
            document.getElementById('out-people').innerText = localBookingData.people;

            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
